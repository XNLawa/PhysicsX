name: Build and Release

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

  publish-binaries:
    name: Publish ${{ matrix.platform }}
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            extension: .exe
          - os: ubuntu-latest
            platform: linux-x64
            extension: ''
          - os: macos-latest
            platform: osx-x64
            extension: ''
          - os: macos-latest
            platform: osx-arm64
            extension: ''

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish ${{ matrix.platform }}
      shell: bash
      run: |
        dotnet publish src/PhysicsX.App/PhysicsX.App.csproj \
          -c Release \
          -r ${{ matrix.platform }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -o ./publish/${{ matrix.platform }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PhysicsX-${{ matrix.platform }}
        path: ./publish/${{ matrix.platform }}

  create-release:
    name: Create Release
    needs: publish-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create ZIP archives for release
      run: |
        cd ./artifacts
        for platform_dir in */; do
          platform_name=$(basename "$platform_dir")
          cd "$platform_dir"
          zip -r "../../PhysicsX-${platform_name}.zip" .
          cd ..
        done
        cd ..

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./PhysicsX-*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
